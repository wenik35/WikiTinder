<div class="card-stack">
  @for (person of persons; track person; let i = $index) {
    <div #card
      class="card"
      [class.card-top]="i === 0"
      [style.zIndex]="persons.length - i"
      (pointerdown)="onPointerDown($event, i)"
      (pointermove)="onPointerMove($event, i)"
      (pointerup)="onPointerUp($event, i)"
      (pointercancel)="onPointerUp($event, i)"
      (pointerleave)="onPointerUp($event, i)">
      <img [src]="person.image" [alt]="person.name || 'card image'" draggable="false" />
      <div class="bottom-fade"></div>
    </div>
  }
  <div class="overlay">
    <h2>{{ persons[0]?.name }}</h2>
    <p>{{ persons[0]?.description }}</p>
    <div class="actions">
      <button class="action-btn dislike-btn" (click)="swipeLeft()" aria-label="Dislike">👎</button>
      <button class="action-btn like-btn" (click)="swipeRight()" aria-label="Like">👍</button>
    </div>
  </div>
</div>
